name: Build Windows Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version name, for example v0.1.12. Empty means manual run number."
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows executable and update package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"
          cache: "pip"

      - name: Create .env from repository secrets
        shell: pwsh
        run: |
          $lines = New-Object System.Collections.Generic.List[string]
          if ("${{ secrets.QWEN_API_KEY }}") {
            $lines.Add("QWEN_API_KEY=${{ secrets.QWEN_API_KEY }}")
          }
          if ("${{ vars.QWEN_BASE_URL }}") {
            $lines.Add("QWEN_BASE_URL=${{ vars.QWEN_BASE_URL }}")
          }
          if ("${{ vars.QWEN_MODEL }}") {
            $lines.Add("QWEN_MODEL=${{ vars.QWEN_MODEL }}")
          }
          if ("${{ secrets.OPENAI_API_KEY }}") {
            $lines.Add("OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}")
          }
          if ("${{ vars.OPENAI_BASE_URL }}") {
            $lines.Add("OPENAI_BASE_URL=${{ vars.OPENAI_BASE_URL }}")
          }
          if ("${{ vars.OPENAI_MODEL }}") {
            $lines.Add("OPENAI_MODEL=${{ vars.OPENAI_MODEL }}")
          }
          if ($lines.Count -gt 0) {
            $lines | Set-Content -Encoding UTF8 ".env"
            Write-Host "Created .env for packaged application."
          } else {
            Write-Host "No model secrets configured. Package will not include .env."
          }

      - name: Build packages
        shell: pwsh
        run: |
          $buildVersion = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.version }}") {
            $buildVersion = "${{ inputs.version }}"
          }
          if (-not $buildVersion -or $buildVersion -eq "main") {
            $buildVersion = "manual-${{ github.run_number }}"
          }
          $env:RELEASE_VERSION = $buildVersion
          Set-ExecutionPolicy -Scope Process Bypass
          $tempLogPath = Join-Path $env:RUNNER_TEMP "build-output.log"
          $tempErrPath = Join-Path $env:RUNNER_TEMP "build-error.log"
          Remove-Item -Force -ErrorAction SilentlyContinue $tempLogPath, $tempErrPath
          $pwsh = (Get-Process -Id $PID).Path
          $process = Start-Process `
            -FilePath $pwsh `
            -ArgumentList @("-NoProfile", "-ExecutionPolicy", "Bypass", "-File", "$PWD\scripts\build_windows.ps1", "-Clean") `
            -Wait `
            -PassThru `
            -RedirectStandardOutput $tempLogPath `
            -RedirectStandardError $tempErrPath
          $exitCode = $process.ExitCode
          New-Item -ItemType Directory -Force "dist" | Out-Null
          if (Test-Path $tempLogPath) {
            Get-Content $tempLogPath | Tee-Object -FilePath "dist\build-output.log"
          }
          if (Test-Path $tempErrPath) {
            Get-Content $tempErrPath | Tee-Object -FilePath "dist\build-output.log" -Append
          }
          if ($exitCode -ne 0) {
            "BUILD_FAILED=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "Build failed with exit code $exitCode. See build-output.log artifact."
          }

      - name: Generate update manifest
        if: env.BUILD_FAILED != '1'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.version }}") {
            $version = "${{ inputs.version }}"
          }
          if (-not $version -or $version -eq "main") {
            $version = "manual-${{ github.run_number }}"
          }

          $updateZip = "dist\LiepinRecruitingAgent-update-win64.zip"
          $fullZip = "dist\LiepinRecruitingAgent-win64.zip"
          $updateHash = (Get-FileHash $updateZip -Algorithm SHA256).Hash.ToLower()
          $fullHash = (Get-FileHash $fullZip -Algorithm SHA256).Hash.ToLower()

          $releaseBase = "https://github.com/${{ github.repository }}/releases/download/$version"
          $manifest = [ordered]@{
            version = $version
            channel = "stable"
            published_at = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            update_url = "$releaseBase/LiepinRecruitingAgent-update-win64.zip"
            full_url = "$releaseBase/LiepinRecruitingAgent-win64.zip"
            sha256 = $updateHash
            full_sha256 = $fullHash
            notes = "Windows 自动构建包"
            force = $false
          }
          $manifest | ConvertTo-Json -Depth 5 | Set-Content -Encoding UTF8 "dist\update.json"
          Get-Content "dist\update.json"

      - name: Upload release packages to Aliyun OSS
        if: env.BUILD_FAILED != '1'
        shell: pwsh
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_OSS_BUCKET: ${{ vars.ALIYUN_OSS_BUCKET }}
          ALIYUN_OSS_ENDPOINT: ${{ vars.ALIYUN_OSS_ENDPOINT }}
          ALIYUN_OSS_PUBLIC_BASE_URL: ${{ vars.ALIYUN_OSS_PUBLIC_BASE_URL }}
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          if (-not $env:ALIYUN_ACCESS_KEY_ID -or -not $env:ALIYUN_ACCESS_KEY_SECRET -or -not $env:ALIYUN_OSS_BUCKET -or -not $env:ALIYUN_OSS_ENDPOINT) {
            Write-Host "Aliyun OSS settings are not complete. Skip OSS upload."
            exit 0
          }
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.version }}") {
            "RELEASE_VERSION=${{ inputs.version }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            $env:RELEASE_VERSION = "${{ inputs.version }}"
          }
          python -m pip install "oss2>=2.18.0"
          python scripts\upload_release_to_oss.py

      - name: Upload workflow artifacts
        if: env.BUILD_FAILED != '1'
        uses: actions/upload-artifact@v4
        with:
          name: LiepinRecruitingAgent-windows-${{ github.run_number }}
          path: |
            dist/LiepinRecruitingAgent-win64.zip
            dist/LiepinRecruitingAgent-update-win64.zip
            dist/update.json
          if-no-files-found: error

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LiepinRecruitingAgent-build-log-${{ github.run_number }}
          path: |
            dist/build-output.log
          if-no-files-found: ignore

      - name: Publish GitHub release for tags
        if: startsWith(github.ref, 'refs/tags/') && env.BUILD_FAILED != '1'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/LiepinRecruitingAgent-win64.zip
            dist/LiepinRecruitingAgent-update-win64.zip
            dist/update.json
          generate_release_notes: true

      - name: Publish build diagnostics release for failed tags
        if: startsWith(github.ref, 'refs/tags/') && env.BUILD_FAILED == '1'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/build-output.log
          name: "${{ github.ref_name }} build diagnostics"
          body: "Windows build failed. Download build-output.log for details."
          generate_release_notes: false

      - name: Fail workflow when build failed
        if: env.BUILD_FAILED == '1'
        shell: pwsh
        run: |
          Write-Error "Windows build failed. Download the build log artifact for details."
