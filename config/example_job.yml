job:
  title: "高级 Java 后端工程师"
  jd: |
    负责核心交易系统后端研发，要求 Java 基础扎实，熟悉 Spring Boot、MySQL、Redis、消息队列。
    有高并发、分布式系统、金融或电商交易系统经验优先。
    希望候选人 5 年以上后端开发经验，具备良好的工程质量意识和团队协作能力。
  must_have:
    - Java
    - Spring Boot
    - MySQL
    - Redis
  nice_to_have:
    - 高并发
    - 分布式
    - 消息队列
    - 金融
    - 电商
  reject_keywords:
    - 实习
    - 应届
  min_score: 75

